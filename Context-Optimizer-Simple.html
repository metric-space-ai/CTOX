<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Context State Distiller</title>
  <style>
    :root{
      --bg:#f2f5fb;
      --panel:#ffffff;
      --panel-soft:#eef3fb;
      --border:#d7e1ef;
      --text:#102033;
      --muted:#66778f;
      --accent:#0f766e;
      --accent-soft:#dbf4ef;
      --blue:#1d4ed8;
      --blue-soft:#e3edff;
      --amber:#b45309;
      --amber-soft:#fff2d8;
      --danger:#b42318;
      --danger-soft:#fde8e8;
      --shadow:0 16px 42px rgba(16,32,51,0.08);
      --radius:18px;
      --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      --sans:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(15,118,110,0.10), transparent 24%),
        radial-gradient(circle at top right, rgba(29,78,216,0.08), transparent 28%),
        var(--bg);
    }

    .app{
      max-width:1500px;
      margin:0 auto;
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .title{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .title h1{
      margin:0;
      font-size:24px;
      letter-spacing:-0.03em;
      line-height:1.05;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(255,255,255,0.76);
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(340px, 0.94fr) minmax(0, 1.16fr);
      gap:16px;
      align-items:start;
    }

    .stack{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panelHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(180deg, rgba(238,243,251,0.8), rgba(255,255,255,0));
    }

    .panelHead h2,
    .panelHead h3{
      margin:0;
      font-size:14px;
      letter-spacing:-0.02em;
    }

    .panelBody{
      padding:16px;
    }

    .grid{
      display:grid;
      gap:12px;
      grid-template-columns:repeat(2, minmax(0, 1fr));
    }

    .grid3{
      display:grid;
      gap:12px;
      grid-template-columns:repeat(3, minmax(0, 1fr));
    }

    .gridOutputs{
      display:grid;
      gap:14px;
      grid-template-columns:repeat(3, minmax(0, 1fr));
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .field label{
      font-size:12px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:0.05em;
    }

    input,
    select,
    textarea,
    button{
      font:inherit;
    }

    input,
    select,
    textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:11px 13px;
      background:#fff;
      color:var(--text);
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:rgba(15,118,110,0.55);
      box-shadow:0 0 0 3px rgba(15,118,110,0.12);
    }

    textarea{
      resize:vertical;
      min-height:160px;
      line-height:1.45;
    }

    .mono{
      font-family:var(--mono);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:var(--panel-soft);
      color:var(--text);
      border-radius:14px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .08s ease, background .14s ease, border-color .14s ease, opacity .14s ease;
    }

    button:hover{
      transform:translateY(-1px);
      border-color:rgba(15,118,110,0.30);
      background:#f7fbfb;
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .primary{
      background:linear-gradient(180deg, #137a71, #0f6a63);
      border-color:#0f6a63;
      color:#fff;
    }

    .primary:hover{
      background:linear-gradient(180deg, #16857b, #0f6a63);
    }

    .danger{
      color:var(--danger);
      background:var(--danger-soft);
      border-color:#f0c7c7;
    }

    .status{
      padding:14px 16px;
      border-radius:16px;
      border:1px solid var(--border);
      background:var(--panel-soft);
      color:var(--muted);
      line-height:1.45;
      min-height:52px;
    }

    .status.running{
      color:#0a524c;
      background:var(--accent-soft);
      border-color:#b9e2db;
    }

    .status.done{
      color:#0a524c;
      background:#eefaf7;
      border-color:#b9e2db;
    }

    .status.error{
      color:#8b1f16;
      background:var(--danger-soft);
      border-color:#efc3c3;
    }

    .metrics{
      display:grid;
      gap:10px;
      grid-template-columns:repeat(5, minmax(0, 1fr));
    }

    .metric{
      border:1px solid var(--border);
      border-radius:16px;
      padding:13px 14px;
      background:linear-gradient(180deg, rgba(238,243,251,0.7), rgba(255,255,255,1));
    }

    .metric span{
      display:block;
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:0.05em;
      margin-bottom:6px;
    }

    .metric strong{
      display:block;
      font-size:22px;
      letter-spacing:-0.03em;
      line-height:1;
    }

    .metric small{
      display:block;
      margin-top:6px;
      color:var(--muted);
      line-height:1.3;
    }

    .timeline{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .stage{
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
      overflow:hidden;
    }

    .stageHead{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(180deg, rgba(238,243,251,0.6), rgba(255,255,255,0));
    }

    .stageHead h4{
      margin:0 0 6px;
      font-size:14px;
    }

    .stageSummary{
      color:var(--muted);
      line-height:1.45;
      white-space:pre-wrap;
    }

    .stageMeta,
    .tagRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--panel-soft);
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .badge.keep{
      background:#eefaf7;
      border-color:#b9e2db;
      color:#0a524c;
    }

    .badge.compress{
      background:var(--amber-soft);
      border-color:#ecd8a1;
      color:#8b4d05;
    }

    .badge.drop{
      background:var(--danger-soft);
      border-color:#efc3c3;
      color:#8b1f16;
    }

    .badge.focus{
      background:var(--accent-soft);
      border-color:#b9e2db;
      color:#0a524c;
    }

    .badge.story{
      background:var(--blue-soft);
      border-color:#c8d9ff;
      color:#1e429f;
    }

    .badge.anchor{
      background:var(--amber-soft);
      border-color:#ecd8a1;
      color:#8b4d05;
    }

    .badge.story_anchor,
    .badge.story_focus,
    .badge.anchor_focus,
    .badge.all{
      background:#ede9fe;
      border-color:#d8cefb;
      color:#5b3ba8;
    }

    .stageBody{
      padding:14px 16px 16px;
    }

    details{
      border:1px solid var(--border);
      border-radius:14px;
      background:#fbfdff;
      overflow:hidden;
    }

    summary{
      list-style:none;
      cursor:pointer;
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      font-weight:700;
    }

    summary::-webkit-details-marker{display:none}

    .decisionList{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:0 14px 14px;
    }

    .decision{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#fff;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .decisionHead{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .decisionTitle{
      font-weight:800;
      letter-spacing:-0.02em;
    }

    .decisionReason{
      color:var(--muted);
      line-height:1.45;
      white-space:pre-wrap;
    }

    .preview{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#f8fbfe;
      font-family:var(--mono);
      font-size:12px;
      line-height:1.45;
      white-space:pre-wrap;
      max-height:220px;
      overflow:auto;
    }

    .blockList{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:980px;
      overflow:auto;
      padding-right:4px;
    }

    .block{
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      background:#fff;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .blockHead{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .blockTitle{
      font-weight:800;
      letter-spacing:-0.02em;
    }

    .blockMeta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
    }

    .outArea{
      min-height:420px;
      font-family:var(--mono);
      font-size:13px;
    }

    .empty{
      color:var(--muted);
      font-size:13px;
    }

    .hidden{display:none !important}

    @media (max-width: 1180px){
      .layout,
      .gridOutputs{
        grid-template-columns:minmax(0, 1fr);
      }
    }

    @media (max-width: 820px){
      .app{
        padding:14px;
      }

      .grid,
      .grid3,
      .metrics{
        grid-template-columns:minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">
        <h1>Context State Distiller</h1>
        <div class="pill">Narrativ + Anker + Fokus</div>
      </div>
      <div class="toolbar">
        <button id="runBtn" class="primary">Start</button>
        <button id="stopBtn" class="danger" disabled>Stop</button>
        <button id="copyBundleBtn" disabled>Bundle kopieren</button>
        <button id="resetBtn">Leeren</button>
      </div>
    </div>

    <div class="layout">
      <div class="stack">
        <section class="panel">
          <div class="panelHead">
            <h2>Input</h2>
          </div>
          <div class="panelBody stack">
            <div class="grid">
              <div class="field">
                <label for="provider">Provider</label>
                <select id="provider">
                  <option value="openai">OpenAI</option>
                  <option value="azure">Azure OpenAI</option>
                </select>
              </div>
              <div class="field">
                <label for="apiKey">API Key</label>
                <input id="apiKey" type="password" autocomplete="off" />
              </div>
              <div class="field hidden" id="azureEndpointField">
                <label for="azureEndpoint">Azure Endpoint</label>
                <input id="azureEndpoint" type="text" autocomplete="off" />
              </div>
              <div class="field hidden" id="azureVersionField">
                <label for="azureApiVersion">Azure API Version</label>
                <input id="azureApiVersion" type="text" value="preview" autocomplete="off" />
              </div>
            </div>

            <div class="grid3">
              <div class="field">
                <label for="model">Model</label>
                <input id="model" type="text" list="modelList" autocomplete="off" />
                <datalist id="modelList">
                  <option value="gpt-5.2"></option>
                  <option value="gpt-5"></option>
                  <option value="gpt-4.1"></option>
                  <option value="gpt-4o"></option>
                </datalist>
              </div>
              <div class="field">
                <label for="effort">Effort</label>
                <select id="effort">
                  <option value="">aus</option>
                  <option value="minimal">minimal</option>
                  <option value="low">low</option>
                  <option value="medium" selected>medium</option>
                  <option value="high">high</option>
                </select>
              </div>
              <div class="field">
                <label for="targetTokens">Bundle Tokens</label>
                <input id="targetTokens" class="mono" type="number" min="256" max="32768" step="256" value="3072" />
              </div>
            </div>

            <div class="grid">
              <div class="field">
                <label for="iterations">Iterationen</label>
                <input id="iterations" class="mono" type="number" min="1" max="6" value="2" />
              </div>
              <div class="field">
                <label for="blockChars">Block Zeichen</label>
                <input id="blockChars" class="mono" type="number" min="600" max="3200" step="100" value="1800" />
              </div>
            </div>

            <div class="field">
              <label for="task">Naechster Schritt</label>
              <textarea id="task" placeholder="Aktueller Arbeitsauftrag"></textarea>
            </div>

            <div class="field">
              <label for="context">Kontext</label>
              <textarea id="context" placeholder="Langer Chat- oder Handoff-Kontext"></textarea>
            </div>
          </div>
        </section>
      </div>

      <div class="stack">
        <section class="panel">
          <div class="panelHead">
            <h2>Status</h2>
          </div>
          <div class="panelBody stack">
            <div id="status" class="status">Bereit.</div>

            <div class="metrics">
              <div class="metric">
                <span>Input</span>
                <strong id="metricInput">0</strong>
                <small id="metricInputSub">0 Tok</small>
              </div>
              <div class="metric">
                <span>Reservoir</span>
                <strong id="metricReservoir">0</strong>
                <small id="metricReservoirSub">0 Bloecke</small>
              </div>
              <div class="metric">
                <span>Narrativ</span>
                <strong id="metricStory">0</strong>
                <small id="metricStorySub">0 Bloecke</small>
              </div>
              <div class="metric">
                <span>Anker</span>
                <strong id="metricAnchor">0</strong>
                <small id="metricAnchorSub">0 Bloecke</small>
              </div>
              <div class="metric">
                <span>Fokus</span>
                <strong id="metricFocus">0</strong>
                <small id="metricFocusSub">0 Bloecke</small>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panelHead">
            <h2>Timeline</h2>
          </div>
          <div class="panelBody">
            <div id="timeline" class="timeline">
              <div class="empty">Keine Stufen.</div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panelHead">
            <h2>Blockrouting</h2>
          </div>
          <div class="panelBody">
            <div id="blockList" class="blockList">
              <div class="empty">Keine Bloecke.</div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panelHead">
            <h2>Outputs</h2>
          </div>
          <div class="panelBody">
            <div class="gridOutputs">
              <div class="field">
                <label for="storyDraft">Kontinuitaetsnarrativ</label>
                <textarea id="storyDraft" class="outArea" readonly></textarea>
              </div>
              <div class="field">
                <label for="anchorDraft">Kontinuitaetsanker</label>
                <textarea id="anchorDraft" class="outArea" readonly></textarea>
              </div>
              <div class="field">
                <label for="focusDraft">Aktiver Fokus</label>
                <textarea id="focusDraft" class="outArea" readonly></textarea>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const CHAR_PER_TOKEN = 4;
    const STORAGE_KEY = "context_state_distiller";
    const STORAGE_MIGRATION_KEYS = [
      STORAGE_KEY,
      "context_state_distiller_v3",
      "context_state_distiller_v2",
      "context_optimizer_simple_v1"
    ];
    const LEGACY_LS = {
      rememberAll: "bsfz_remember_all",
      provider: "bsfz_provider",
      effort: "bsfz_effort",
      input: "bsfz_input_text",
      nextTask: "context_optimizer_next_task",
      targetContextTokens: "context_optimizer_target_tokens",
      openaiKey: "bsfz_openai_key",
      openaiModel: "bsfz_openai_model",
      azureKey: "bsfz_azure_key",
      azureEndpoint: "bsfz_azure_endpoint",
      azureApiVersion: "bsfz_azure_apiversion",
      azureDeployment: "bsfz_azure_deployment"
    };
    const ROUTE_VALUES = ["story", "anchor", "focus", "story_anchor", "story_focus", "anchor_focus", "all", "discard"];
    const ROUTE_TARGETS = {
      story: ["story"],
      anchor: ["anchor"],
      focus: ["focus"],
      story_anchor: ["story", "anchor"],
      story_focus: ["story", "focus"],
      anchor_focus: ["anchor", "focus"],
      all: ["story", "anchor", "focus"],
      discard: []
    };

    const SCREEN_SCHEMA = {
      type: "object",
      additionalProperties: false,
      required: ["summary", "decisions"],
      properties: {
        summary: { type: "string" },
        decisions: {
          type: "array",
          items: {
            type: "object",
            additionalProperties: false,
            required: ["id", "action", "bucket", "reason", "revised_text"],
            properties: {
              id: { type: "string" },
              action: { type: "string", enum: ["keep", "compress", "drop"] },
              bucket: { type: "string", enum: ROUTE_VALUES },
              reason: { type: "string" },
              revised_text: { type: "string" }
            }
          }
        }
      }
    };

    const ITERATION_SCHEMA = {
      type: "object",
      additionalProperties: false,
      required: ["summary", "decisions"],
      properties: {
        summary: { type: "string" },
        decisions: {
          type: "array",
          items: {
            type: "object",
            additionalProperties: false,
            required: ["id", "action", "bucket", "reason", "revised_text"],
            properties: {
              id: { type: "string" },
              action: { type: "string", enum: ["keep", "compress", "drop"] },
              bucket: { type: "string", enum: ROUTE_VALUES },
              reason: { type: "string" },
              revised_text: { type: "string" }
            }
          }
        }
      }
    };

    const OUTPUT_SCHEMA = {
      type: "object",
      additionalProperties: false,
      required: ["story_title", "story_draft", "anchor_title", "anchor_draft", "focus_title", "focus_draft"],
      properties: {
        story_title: { type: "string" },
        story_draft: { type: "string" },
        anchor_title: { type: "string" },
        anchor_draft: { type: "string" },
        focus_title: { type: "string" },
        focus_draft: { type: "string" }
      }
    };

    const state = {
      running: false,
      abortController: null,
      timeline: [],
      blocks: [],
      storyDraft: "",
      anchorDraft: "",
      focusDraft: ""
    };

    const $ = (id) => document.getElementById(id);

    function safeStorageGet(key){
      try{
        return localStorage.getItem(key);
      }catch(_err){
        return null;
      }
    }

    function safeStorageSet(key, value){
      try{
        localStorage.setItem(key, value);
        return true;
      }catch(_err){
        return false;
      }
    }

    function parseStoredJson(key){
      const raw = safeStorageGet(key);
      if(!raw) return null;
      try{
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : null;
      }catch(_err){
        return null;
      }
    }

    function loadLegacySettings(){
      const provider = safeStorageGet(LEGACY_LS.provider) || "openai";
      const isAzure = provider === "azure";
      const payload = {
        provider,
        apiKey: isAzure ? (safeStorageGet(LEGACY_LS.azureKey) || "") : (safeStorageGet(LEGACY_LS.openaiKey) || ""),
        azureEndpoint: safeStorageGet(LEGACY_LS.azureEndpoint) || "",
        azureApiVersion: safeStorageGet(LEGACY_LS.azureApiVersion) || "preview",
        model: isAzure ? (safeStorageGet(LEGACY_LS.azureDeployment) || "") : (safeStorageGet(LEGACY_LS.openaiModel) || ""),
        effort: safeStorageGet(LEGACY_LS.effort) ?? "medium",
        targetTokens: safeStorageGet(LEGACY_LS.targetContextTokens) || "",
        iterations: "",
        blockChars: "",
        task: safeStorageGet(LEGACY_LS.nextTask) || "",
        context: safeStorageGet(LEGACY_LS.input) || ""
      };

      const hasAny = Object.values(payload).some((value) => String(value || "").trim() !== "");
      return hasAny ? payload : {};
    }

    function loadSettings(){
      for(const key of STORAGE_MIGRATION_KEYS){
        const parsed = parseStoredJson(key);
        if(parsed) return parsed;
      }
      return loadLegacySettings();
    }

    function saveSettings(){
      const payload = {
        provider: $("provider").value,
        apiKey: $("apiKey").value,

    function normalizeText(value){
      return String(value || "").replace(/\r\n?/g, "\n").trim();
    }

    function collapseWhitespace(value){
      return normalizeText(value).replace(/[ \t]+/g, " ").replace(/\n{3,}/g, "\n\n");
    }

    function countChars(value){
      return normalizeText(value).length;
    }

    function approxTokens(chars){
      return Math.max(0, Math.ceil(chars / CHAR_PER_TOKEN));
    }

    function clampInt(value, fallback, min, max){
      const num = Number(value);
      if(!Number.isFinite(num)) return fallback;
      return Math.min(max, Math.max(min, Math.round(num)));
    }

    function formatNumber(value){
      return new Intl.NumberFormat("de-DE").format(Number(value || 0));
    }

    function escapeHtml(value){
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function shorten(value, max = 240){
      const text = collapseWhitespace(value);
      if(text.length <= max) return text;
      return `${text.slice(0, Math.max(0, max - 1)).trimEnd()}...`;
    }

    function buildUrlAndHeaders(apiKey){
      const provider = $("provider").value;
      if(provider === "azure"){
        const endpoint = normalizeText($("azureEndpoint").value);
        const apiVersion = normalizeText($("azureApiVersion").value) || "preview";
        if(!endpoint) throw new Error("Azure Endpoint fehlt.");
        return {
          url: `${endpoint.replace(/\/+$/, "")}/openai/v1/responses?api-version=${encodeURIComponent(apiVersion)}`,
          headers: {
            "Content-Type": "application/json",
            "api-key": apiKey
          }
        };
      }

      return {
        url: "https://api.openai.com/v1/responses",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        }
      };
    }

    function extractOutputText(response){
      if(!response || typeof response !== "object") return "";
      if(typeof response.output_text === "string") return response.output_text;
      if(!Array.isArray(response.output)) return "";
      let text = "";
      for(const item of response.output){
        if(!item || !Array.isArray(item.content)) continue;
        for(const part of item.content){
          if(part?.type === "output_text" && typeof part.text === "string"){
            text += part.text;
          }
        }
      }
      return text;
    }

    async function callStructuredModel({ schemaName, schema, prompt, signal }){
      const apiKey = normalizeText($("apiKey").value);
      const model = normalizeText($("model").value);
      const effort = $("effort").value;
      const { url, headers } = buildUrlAndHeaders(apiKey);

      const payload = {
        model,
        stream: false,
        store: false,
        input: [
          {
            role: "user",
            content: [
              {
                type: "input_text",
                text: prompt
              }
            ]
          }
        ],
        text: {
          format: {
            type: "json_schema",
            name: schemaName,
            strict: true,
            schema
          }
        }
      };

      if(effort) payload.reasoning = { effort };

      const response = await fetch(url, {
        method: "POST",
        headers,
        body: JSON.stringify(payload),
        signal
      });

      if(!response.ok){
        let body = "";
        try{ body = await response.text(); }catch(_err){}
        throw new Error(`API Fehler ${response.status}: ${body || response.statusText}`);
      }

      const json = await response.json();
      const text = extractOutputText(json).trim();
      if(!text) throw new Error("Leere Antwort vom Modell.");
      return JSON.parse(text);
    }

    function parseSections(rawText){
      const text = normalizeText(rawText);
      if(!text) return [];

      const lines = text.split("\n");
      const sections = [];
      let current = { heading: "", lines: [] };

      const flush = () => {
        const body = current.lines.join("\n").trim();
        if(current.heading || body){
          sections.push({
            heading: current.heading || "Kontext",
            body
          });
        }
      };

      for(const line of lines){
        const match = line.match(/^\s{0,3}#{1,6}\s+(.+?)\s*$/);
        if(match){
          flush();
          current = { heading: match[1].trim(), lines: [] };
        }else{
          current.lines.push(line);
        }
      }

      flush();

      const nonEmpty = sections.filter((section) => normalizeText(section.body));
      return nonEmpty.length ? nonEmpty : [{ heading: "Kontext", body: text }];
    }

    function segmentContext(rawText, maxBlockChars){
      const sections = parseSections(rawText);
      const blocks = [];
      let globalIndex = 1;

      for(const section of sections){
        const paragraphs = normalizeText(section.body)
          .split(/\n{2,}/)
          .map((part) => part.trim())
          .filter(Boolean);

        const sourceParagraphs = paragraphs.length ? paragraphs : [normalizeText(section.body)];
        let buffer = "";
        let localIndex = 1;

        const pushBlock = () => {
          const text = normalizeText(buffer);
          if(!text) return;
          const id = `B${String(globalIndex).padStart(2, "0")}`;
          const title = localIndex > 1 ? `${section.heading} / Teil ${localIndex}` : section.heading;
          blocks.push({
            id,
            title,
            sourceHeading: section.heading,
            originalText: text,
            currentText: text,
            action: "keep",
            bucket: "all",
            dropped: false,
            reason: "Noch nicht bewertet.",
            history: []
          });
          globalIndex += 1;
          localIndex += 1;
          buffer = "";
        };

        for(const paragraph of sourceParagraphs){
          const candidate = buffer ? `${buffer}\n\n${paragraph}` : paragraph;
          if(buffer && candidate.length > maxBlockChars){
            pushBlock();
            buffer = paragraph;
          }else{
            buffer = candidate;
          }
        }

        pushBlock();
      }

      return blocks;
    }

    function serializeBlocksForPrompt(blocks){
      return blocks.map((block) => ({
        id: block.id,
        title: block.title,
        chars: countChars(block.currentText),
        bucket: block.bucket,
        text: block.currentText
      }));
    }

    function normalizeBucket(action, bucket, fallback = "all"){
      if(action === "drop") return "discard";
      if(ROUTE_VALUES.includes(bucket) && bucket !== "discard") return bucket;
      if(ROUTE_VALUES.includes(fallback) && fallback !== "discard") return fallback;
      return "all";
    }

    function coerceRevisedText(action, revisedText, fallback){
      const cleanFallback = normalizeText(fallback);
      const clean = normalizeText(revisedText);
      if(action === "drop") return "";
      if(!clean) return cleanFallback;
      if(clean.length > cleanFallback.length + 120) return cleanFallback;
      return clean;
    }

    function ensureDecisionMap(decisions){
      const map = new Map();
      for(const item of Array.isArray(decisions) ? decisions : []){
        if(!item || !item.id) continue;
        map.set(String(item.id), item);
      }
      return map;
    }

    function applyDecisions(blocks, decisions, stageLabel){
      const decisionMap = ensureDecisionMap(decisions);
      const changes = [];

      for(const block of blocks){
        if(block.dropped) continue;

        const incoming = decisionMap.get(block.id) || {
          id: block.id,
          action: "keep",
          bucket: block.bucket || "all",
          reason: "Keine Modellentscheidung vorhanden, daher konservativ behalten.",
          revised_text: ""
        };

        const action = ["keep", "compress", "drop"].includes(incoming.action) ? incoming.action : "keep";
        const beforeText = block.currentText;
        const beforeChars = countChars(beforeText);
        const previousBucket = block.bucket;
        const nextText = coerceRevisedText(action, incoming.revised_text, beforeText);
        const bucket = normalizeBucket(action, incoming.bucket, block.bucket);

        block.action = action;
        block.reason = normalizeText(incoming.reason) || "Keine Begruendung.";
        block.bucket = bucket;

        if(action === "drop"){
          block.dropped = true;
        }else{
          block.currentText = nextText;
        }

        const afterChars = action === "drop" ? 0 : countChars(block.currentText);
        const changed = action !== "keep" || normalizeText(beforeText) !== normalizeText(block.currentText) || bucket !== previousBucket;

        block.history.push({
          stage: stageLabel,
          action,
          bucket,
          reason: block.reason,
          beforeChars,
          afterChars
        });

        changes.push({
          id: block.id,
          title: block.title,
          action,
          bucket,
          reason: block.reason,
          beforeChars,
          afterChars,
          changed,
          previewBefore: shorten(beforeText, 260),
          previewAfter: action === "drop" ? "" : shorten(block.currentText, 260)
        });
      }

      return changes;
    }

    function getRetainedBlocks(){
      return state.blocks.filter((block) => !block.dropped);
    }

    function routeTargets(route){
      return ROUTE_TARGETS[route] || ROUTE_TARGETS.all;
    }

    function routeIncludes(route, target){
      return routeTargets(route).includes(target);
    }

    function routeLabel(route){
      return String(route || "").replace(/_/g, "+");
    }

    function getBucketBlocks(bucket){
      return getRetainedBlocks().filter((block) => routeIncludes(block.bucket, bucket));
    }

    function getRetainedChars(){
      return getRetainedBlocks().reduce((sum, block) => sum + countChars(block.currentText), 0);
    }

    function getBucketChars(bucket){
      return getBucketBlocks(bucket).reduce((sum, block) => sum + countChars(block.currentText), 0);
    }

    function formatDelta(before, after){
      const diff = after - before;
      const sign = diff > 0 ? "+" : "";
      return `${sign}${formatNumber(diff)}`;
    }

                            <span class="badge">${formatNumber(item.beforeChars)} -> ${formatNumber(item.afterChars)}</span>

    function renderBlocks(){
      const node = $("blockList");
      const retainedBlocks = getRetainedBlocks();
      if(!retainedBlocks.length){
        node.innerHTML = '<div class="empty">Keine Bloecke.</div>';
        return;
      }

      const sorted = retainedBlocks.slice().sort((a, b) => {
        const order = { all: 0, story_focus: 1, story_anchor: 2, anchor_focus: 3, story: 4, anchor: 5, focus: 6 };
        const left = order[a.bucket] ?? 9;
        const right = order[b.bucket] ?? 9;
        if(left !== right) return left - right;
        return a.id.localeCompare(b.id);
      });

      node.innerHTML = sorted.map((block) => {
        const last = block.history[block.history.length - 1];
        return `
          <article class="block">
            <div class="blockHead">
              <div>
                <div class="blockTitle">${escapeHtml(block.id)} - ${escapeHtml(block.title)}</div>
                <div class="blockMeta">
                  <span>${formatNumber(countChars(block.currentText))} Zeichen</span>
                  <span>${formatNumber(approxTokens(countChars(block.currentText)))} Tok</span>
                </div>

              <div class="tagRow">
                <span class="badge ${escapeHtml(block.bucket)}">${escapeHtml(routeLabel(block.bucket))}</span>
                <span class="badge ${escapeHtml(block.action)}">${escapeHtml(block.action)}</span>
              </div>
            </div>
            <div class="decisionReason">${escapeHtml(last?.reason || block.reason)}</div>
            <div class="preview">${escapeHtml(block.currentText)}</div>
          </article>
        `;
      }).join("");
    }

    function buildBundleText(){
      const parts = [];
      if(state.storyDraft){
        parts.push("## Kontinuitaetsnarrativ");
        parts.push(state.storyDraft);
      }
      if(state.anchorDraft){
        parts.push("## Kontinuitaetsanker");
        parts.push(state.anchorDraft);
      }
      if(state.focusDraft){
        parts.push("## Aktiver Fokus");
        parts.push(state.focusDraft);
      }
      return parts.join("\n\n").trim();
    }

    async function runOptimizer(){
      if(state.running) return;
      validateInputs();
      saveSettings();
      resetOutput();

      const task = normalizeText($("task").value);
      const contextText = normalizeText($("context").value);
      const targetTokens = clampInt($("targetTokens").value, 3072, 256, 32768);
      const finalTargetChars = targetTokens * CHAR_PER_TOKEN;
      const reservoirTargetChars = Math.round(finalTargetChars * 1.45);
      const iterations = clampInt($("iterations").value, 2, 1, 6);
      const blockChars = clampInt($("blockChars").value, 1800, 600, 3200);

      state.running = true;
      state.abortController = new AbortController();
      $("runBtn").disabled = true;
      $("stopBtn").disabled = false;
      $("copyBundleBtn").disabled = true;

      try{
        renderStatus("Segmentierung laeuft ...", "running");
        state.blocks = segmentContext(contextText, blockChars);
        renderMetrics();
        renderBlocks();

        pushStage({
          title: "0. Segmentierung",
          summary: "Lokale Zerlegung in Bloecke.",
          beforeChars: countChars(contextText),
          afterChars: countChars(contextText),
          beforeBlocks: 0,
          afterBlocks: state.blocks.length,
          decisions: []
        });

        renderStatus("Grobfilter laeuft ...", "running");
        const screenResult = await callStructuredModel({
          schemaName: "state_distiller_screen",
          schema: SCREEN_SCHEMA,
          prompt: buildScreenPrompt({
            task,
            reservoirTargetChars,
            finalTargetChars,
            blocks: state.blocks
          }),
          signal: state.abortController.signal
        });

        const screenBeforeChars = getRetainedChars();
        const screenBeforeBlocks = getRetainedBlocks().length;
        const screenChanges = applyDecisions(state.blocks, screenResult.decisions, "Grobfilter");
        pushStage({
          title: "1. Grobfilter",
          summary: normalizeText(screenResult.summary) || "Kein Kommentar.",
          beforeChars: screenBeforeChars,
          afterChars: getRetainedChars(),
          beforeBlocks: screenBeforeBlocks,
          afterBlocks: getRetainedBlocks().length,
          decisions: screenChanges
        });

        let previousChars = getRetainedChars();

        for(let index = 1; index <= iterations; index += 1){
          const retainedBlocks = getRetainedBlocks();
          if(!retainedBlocks.length){
            pushStage({
              title: `${index + 1}. Iteration ${index}`,
              summary: "Kein Reservoir mehr uebrig.",
              beforeChars: 0,
              afterChars: 0,
              beforeBlocks: 0,
              afterBlocks: 0,
              decisions: []
            });
            break;
          }

          if(index > 1 && previousChars <= reservoirTargetChars){
            pushStage({
              title: `${index + 1}. Iteration ${index}`,
              summary: "Reservoir-Ziel erreicht. Weitere Schleife gestoppt.",
              beforeChars: previousChars,
              afterChars: previousChars,
              beforeBlocks: retainedBlocks.length,
              afterBlocks: retainedBlocks.length,
              decisions: []
            });
            break;
          }

          renderStatus(`Iteration ${index} laeuft ...`, "running");
          const iterationResult = await callStructuredModel({
            schemaName: `state_distiller_iteration_${index}`,
            schema: ITERATION_SCHEMA,
            prompt: buildIterationPrompt({
              task,
              reservoirTargetChars,
              iterationIndex: index,
              currentChars: previousChars,
              blocks: retainedBlocks
            }),
            signal: state.abortController.signal
          });

          const beforeChars = getRetainedChars();
          const beforeBlocks = getRetainedBlocks().length;
          const iterationChanges = applyDecisions(state.blocks, iterationResult.decisions, `Iteration ${index}`);
          const afterChars = getRetainedChars();
          const afterBlocks = getRetainedBlocks().length;

          pushStage({
            title: `${index + 1}. Iteration ${index}`,
            summary: normalizeText(iterationResult.summary) || "Kein Kommentar.",
            beforeChars,
            afterChars,
            beforeBlocks,
            afterBlocks,
            decisions: iterationChanges
          });

          const realChange = afterChars !== beforeChars || iterationChanges.some((item) => item.changed);
          previousChars = afterChars;

          if(!realChange){
            pushStage({
              title: `${index + 1}.a Stop`,
              summary: "Keine weitere inhaltliche Aenderung erkannt.",
              beforeChars: afterChars,
              afterChars,
              beforeBlocks: afterBlocks,
              afterBlocks,
              decisions: []
            });
            break;
          }
        }

        const storyBlocks = getBucketBlocks("story");
        const anchorBlocks = getBucketBlocks("anchor");
        const focusBlocks = getBucketBlocks("focus");

        if(!storyBlocks.length && !anchorBlocks.length && !focusBlocks.length){
          renderOutputs();
          renderStatus("Kein Output erzeugt.", "error");
          return;
        }

        renderStatus("Outputs werden erzeugt ...", "running");
        const outputResult = await callStructuredModel({
          schemaName: "state_distiller_outputs",
          schema: OUTPUT_SCHEMA,
          prompt: buildOutputPrompt({
            task,
            finalTargetChars,
            storyBlocks,
            anchorBlocks,
            focusBlocks
          }),
          signal: state.abortController.signal
        });

        state.storyDraft = normalizeText(outputResult.story_draft);
        state.anchorDraft = normalizeText(outputResult.anchor_draft);
        state.focusDraft = normalizeText(outputResult.focus_draft);
        renderOutputs();

        pushStage({
          title: "4. Outputs",
          summary: `${normalizeText(outputResult.story_title) || "Narrativ"} / ${normalizeText(outputResult.anchor_title) || "Anker"} / ${normalizeText(outputResult.focus_title) || "Fokus"}`,
          beforeChars: getRetainedChars(),
          afterChars: countChars(state.storyDraft) + countChars(state.anchorDraft) + countChars(state.focusDraft),
          beforeBlocks: getRetainedBlocks().length,
          afterBlocks: (state.storyDraft ? 1 : 0) + (state.anchorDraft ? 1 : 0) + (state.focusDraft ? 1 : 0),
          decisions: []
        });

        renderStatus("Fertig.", "done");
      }finally{
        state.running = false;
        state.abortController = null;
        $("runBtn").disabled = false;
        $("stopBtn").disabled = true;
      }
    }

    function attachEvents(){
      const persist = () => saveSettings();

      $("provider").addEventListener("change", () => {
        syncProviderUi();
        saveSettings();
      });

      [
        "apiKey",
        "azureEndpoint",
        "azureApiVersion",
        "model",
        "effort",
        "targetTokens",
        "iterations",
        "blockChars",
        "task",
        "context"
      ].forEach((id) => {
        $(id).addEventListener("input", persist);
        $(id).addEventListener("change", persist);
      });

      window.addEventListener("pagehide", persist);
      window.addEventListener("beforeunload", persist);

      $("runBtn").addEventListener("click", async () => {
        try{
          await runOptimizer();
        }catch(error){
          const isAbort = error?.name === "AbortError";
          renderStatus(isAbort ? "Gestoppt." : (error?.message || "Fehler."), isAbort ? "" : "error");
          state.running = false;
          state.abortController = null;
          $("runBtn").disabled = false;
          $("stopBtn").disabled = true;
        }
      });

      $("stopBtn").addEventListener("click", () => {
        state.abortController?.abort();
      });

      $("copyBundleBtn").addEventListener("click", async () => {
        const bundle = buildBundleText();
        if(!bundle) return;
        try{
          await navigator.clipboard.writeText(bundle);
          renderStatus("Bundle kopiert.", "done");
        }catch(_err){
          renderStatus("Kopieren fehlgeschlagen.", "error");
        }
      });

      $("resetBtn").addEventListener("click", () => {
        resetOutput();
      });
    }

    hydrateFromStorage();
    attachEvents();
    resetOutput();
  </script>
</body>
</html>
