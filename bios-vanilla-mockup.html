<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CTO-Agent BIOS Mockup</title>
  <style>
    :root{--bg:#001a8c;--panel:#0024ad;--deep:#00145f;--line:#7d95ea;--text:#eef3ff;--muted:#b8c7ff;--head:#d7d7d7;--headText:#111;--accent:#ffd95e}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.4 "Courier New",monospace}
    .bios{min-height:100%;display:grid;grid-template-rows:auto auto 1fr auto}
    .bar,.foot{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:6px 10px}
    .bar{background:var(--head);color:var(--headText);border-bottom:2px solid #000}.foot{border-top:1px solid var(--line);color:var(--muted)}
    #tabs{display:flex;gap:4px;flex-wrap:wrap;padding:8px 8px 0}
    .tab{border:1px solid var(--line);border-bottom:0;background:#1730a5;color:var(--muted);padding:6px 10px;cursor:pointer}
    .tab.on{background:var(--panel);color:var(--text)}
    .body{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 96px);padding:0 8px 8px}
    .left,.right{background:var(--panel);border:1px solid var(--line);padding:10px;overflow:auto}.left{border-right:0}
    .pane{display:none}.pane.on{display:block}
    fieldset{margin:0 0 10px;border:1px solid var(--line);padding:10px}legend{padding:0 6px;color:var(--accent)}
    label{display:block;margin:0 0 8px;color:var(--muted)}
    input,textarea,select,button{width:100%;font:inherit}
    input,textarea,select{margin-top:4px;padding:6px;color:var(--text);background:var(--deep);border:1px solid var(--line)}
    textarea{min-height:82px;resize:vertical}
    button{padding:6px 8px;border:1px solid var(--line);background:#1738cb;color:var(--text);cursor:pointer}
    .pick{margin-bottom:6px;text-align:left;background:var(--deep)}.pick.on{background:#2449df}
    .panel{background:var(--deep);border:1px solid #5b74d8;padding:10px;margin-bottom:10px}
    .prompt{color:var(--accent);margin-bottom:8px}.muted{color:var(--muted);font-size:12px}
    .chatlog{background:#00104d;border:1px solid var(--line);padding:8px;min-height:220px;max-height:340px;overflow:auto;margin-bottom:8px}
    .msg{padding:6px 0;border-bottom:1px dotted #5e79e2}.msg:last-child{border-bottom:0}.meta{color:var(--muted);font-size:12px}
    .send{display:flex;gap:8px}.send button{width:auto}
    .tree,.code{background:#00104d;border:1px solid var(--line);padding:10px;white-space:pre-wrap}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    table{width:100%;border-collapse:collapse}th,td{border:1px solid #5f7ce6;padding:6px;vertical-align:top;text-align:left}th{font-weight:normal;color:var(--muted)}
    @media (max-width:900px){.body,.grid{grid-template-columns:1fr}.left{border-right:1px solid var(--line)}}
  </style>
</head>
<body>
  <div class="bios">
    <div class="bar"><div>CTO-Agent BIOS Setup Utility</div><div>Mockup</div></div>
    <div id="tabs"></div>
    <div class="body">
      <aside class="left">
        <div id="left-main" class="pane on">
          <fieldset>
            <legend>BIOS</legend>
            <label>Agent Name<input id="bios-name"></label>
            <label>Homepage Title<input id="bios-title"></label>
            <label>Owner<input id="bios-owner"></label>
            <label>Mission<textarea id="bios-mission"></textarea></label>
          </fieldset>
          <fieldset>
            <legend>Status</legend>
            <label>BIOS State<select id="bios-state"><option>draft</option><option>frozen</option></select></label>
            <label>Brain Access<select id="bios-brain"><option>kleinhirn_only</option><option>kleinhirn_plus_grosshirn</option></select></label>
            <label>Active Mode<input id="bios-mode"></label>
            <label>Queue<input id="bios-queue"></label>
          </fieldset>
        </div>

        <div id="left-organigram" class="pane">
          <fieldset>
            <legend>Organigram</legend>
            <label>Owner<input id="org-owner"></label>
            <label>Reports To<input id="org-reports"></label>
            <label>Board<textarea id="org-board"></textarea></label>
            <label>Subagents<textarea id="org-subagents"></textarea></label>
          </fieldset>
        </div>

        <div id="left-agents" class="pane">
          <fieldset>
            <legend>Agents</legend>
            <div id="agent-picks"></div>
          </fieldset>
          <fieldset>
            <legend>Edit</legend>
            <label>Name<input id="agent-name"></label>
            <label>Role<input id="agent-role"></label>
            <label>Model<input id="agent-model"></label>
            <label>Tools<textarea id="agent-tools"></textarea></label>
            <label>Tool Contracts<textarea id="agent-contracts"></textarea></label>
            <label>Skills<textarea id="agent-skills"></textarea></label>
          </fieldset>
        </div>

        <div id="left-sqlite" class="pane">
          <fieldset>
            <legend>SQLite</legend>
            <label>DB Path<input id="db-path"></label>
            <label>Table<select id="db-table"></select></label>
          </fieldset>
        </div>

        <div id="left-secrets" class="pane">
          <fieldset>
            <legend>Secrets</legend>
            <label>Entries<textarea id="secret-lines"></textarea></label>
          </fieldset>
        </div>

        <div id="left-root" class="pane">
          <fieldset>
            <legend>Root</legend>
            <label>Superpassword<select id="root-password"><option>configured</option><option>missing</option></select></label>
            <label>Branding Lock<select id="root-branding"><option>off</option><option>on</option></select></label>
            <label>BIOS Freeze<select id="root-freeze"><option>draft</option><option>frozen</option></select></label>
          </fieldset>
        </div>
      </aside>

      <main class="right">
        <div id="right-main" class="pane on">
          <div class="panel"><div class="prompt">START HERE: CHAT WITH CTO</div></div>
          <div class="panel" id="main-summary"></div>
          <div class="panel">
            <div class="chatlog" id="chat-log"></div>
            <div class="send"><input id="chat-input" placeholder="Message to the CTO ..."><button id="chat-send" type="button">Send</button></div>
          </div>
        </div>

        <div id="right-organigram" class="pane">
          <div class="tree" id="org-preview"></div>
        </div>

        <div id="right-agents" class="pane">
          <div class="panel" id="agent-summary"></div>
          <div class="grid">
            <div class="code" id="agent-tools-preview"></div>
            <div class="code" id="agent-contracts-preview"></div>
          </div>
          <div class="code" id="agent-skills-preview" style="margin-top:10px"></div>
        </div>

        <div id="right-sqlite" class="pane">
          <div class="muted" id="db-path-preview"></div>
          <div id="db-preview"></div>
        </div>

        <div id="right-secrets" class="pane">
          <div id="secret-preview"></div>
        </div>

        <div id="right-root" class="pane">
          <div class="panel" id="root-summary"></div>
        </div>
      </main>
    </div>
    <div class="foot"><div>Minimal core.</div><div>Tabs on top · inputs on the left · core view on the right</div></div>
  </div>

  <script>
    const state = {
      tab: "main",
      agent: "cto",
      bios: { name: "CTO-Agent", title: "CTO-Agent BIOS", owner: "Michael Welsch", mission: "Build and run the always-on CTO control plane.", state: "draft", brain: "kleinhirn_only", mode: "execute_task", queue: "4" },
      org: { owner: "Michael Welsch", reports: "Owner / Board", board: "Michael Welsch\nAdvisory Board", subagents: "Browser Agent\nHomepage Worker\nRepair Agent\nSpecialist Factory" },
      db: { path: "runtime/cto_agent.db", table: "owner_trust" },
      secrets: { lines: "CTO_AGENT_PORT=8443\nCTO_AGENT_ROOT=/Users/.../CTO-Agent\nOPENAI_API_KEY=sk-example-123456\nBROWSER_AGENT_BRIDGE_PORT=12751" },
      root: { password: "configured", branding: "off", freeze: "draft" },
      chat: [
        { who: "system", text: "Start by chatting with the CTO here." },
        { who: "owner", text: "I want a minimal BIOS homepage with chat, organigram, and agent inspection." }
      ],
      agents: {
        cto: { name: "CTO-Agent", role: "root_agent", model: "gpt-oss-20b", tools: "command_exec\ninterrupt_queue\nhomepage_builder", contracts: "execution_authority_policy\nloop_safety_policy\nhomepage_policy", skills: "cto-origin-history\nopenai-docs" },
        browser: { name: "Browser Agent", role: "browser_worker", model: "vision runtime", tools: "chrome_bridge\nscreenshot\ndom_dump", contracts: "browser_engine_policy\nbrowser_capability_policy", skills: "browser-inspection" },
        homepage: { name: "Homepage Worker", role: "ui_worker", model: "gpt-oss-20b", tools: "template_patch\nrevision_log", contracts: "homepage_policy", skills: "bios-template-rewire" },
        repair: { name: "Repair Agent", role: "repair_worker", model: "gpt-oss-20b", tools: "repo_patch\nreview_export", contracts: "repair_execution_contract", skills: "cto-repair" }
      },
      tables: {
        owner_trust: [["owner_name", "Michael Welsch"], ["bios_primary", "true"], ["superpassword_set", "true"], ["brain_access_mode", "kleinhirn_only"]],
        tasks: [["#482", "homepage_bridge", "active"], ["#481", "homepage_policy", "queued"], ["#473", "resource_census", "queued"]],
        loop_interrupts: [["#918", "bios", "processed"], ["#919", "bios", "claimed"]],
        skills: [["cto-origin-history", "installed"], ["openai-docs", "installed"], ["bios-template-rewire", "planned"]]
      }
    };

    const tabs = ["main", "organigram", "agents", "sqlite", "secrets", "root"];
    const agentKeys = ["cto", "browser", "homepage", "repair"];
    const $ = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
    const splitLines = (v) => String(v ?? "").split("\n").filter((x) => x.trim());
    const mask = (v) => !v ? "" : v.length < 7 ? "******" : v.slice(0, 2) + "..." + v.slice(-2);

    function table(rows) {
      return `<table>${rows.map(([k, v]) => `<tr><th>${esc(k)}</th><td>${esc(v)}</td></tr>`).join("")}</table>`;
    }

    function matrix(rows) {
      return `<table><thead><tr><th>Col 1</th><th>Col 2</th><th>Col 3</th></tr></thead><tbody>${rows.map((r) => `<tr><td>${esc(r[0] || "")}</td><td>${esc(r[1] || "")}</td><td>${esc(r[2] || "")}</td></tr>`).join("")}</tbody></table>`;
    }

    function showTab(name) {
      state.tab = name;
      document.querySelectorAll(".tab").forEach((el) => el.classList.toggle("on", el.dataset.tab === name));
      tabs.forEach((tab) => {
        $(`left-${tab}`).classList.toggle("on", tab === name);
        $(`right-${tab}`).classList.toggle("on", tab === name);
      });
    }

    function syncMain() {
      $("main-summary").innerHTML = table([
        ["Agent", state.bios.name],
        ["Homepage", state.bios.title],
        ["Owner", state.bios.owner],
        ["Mission", state.bios.mission],
        ["BIOS State", state.bios.state],
        ["Brain", state.bios.brain],
        ["Mode", state.bios.mode],
        ["Queue", state.bios.queue]
      ]);
    }

    function syncChat() {
      $("chat-log").innerHTML = state.chat.map((m) => `<div class="msg"><div class="meta">${esc(m.who)}</div><div>${esc(m.text)}</div></div>`).join("");
      $("chat-log").scrollTop = $("chat-log").scrollHeight;
    }

    function syncOrganigram() {
      const board = splitLines(state.org.board).map((v) => `   • Board: ${v}`).join("\n");
      const subs = splitLines(state.org.subagents).map((v) => `      └─ ${v}`).join("\n");
      $("org-preview").textContent =
        `${state.org.owner}\n` +
        `└─ Reports To: ${state.org.reports}\n` +
        `${board}\n` +
        `   └─ CTO-Agent\n` +
        `${subs}`;
    }

    function renderAgentPicks() {
      $("agent-picks").innerHTML = agentKeys.map((key) => `<button class="pick ${state.agent === key ? "on" : ""}" data-agent="${key}" type="button">${esc(state.agents[key].name)}</button>`).join("");
    }

    function loadAgentForm() {
      const a = state.agents[state.agent];
      $("agent-name").value = a.name;
      $("agent-role").value = a.role;
      $("agent-model").value = a.model;
      $("agent-tools").value = a.tools;
      $("agent-contracts").value = a.contracts;
      $("agent-skills").value = a.skills;
      renderAgentPicks();
      syncAgent();
    }

    function saveAgentForm() {
      const a = state.agents[state.agent];
      a.name = $("agent-name").value;
      a.role = $("agent-role").value;
      a.model = $("agent-model").value;
      a.tools = $("agent-tools").value;
      a.contracts = $("agent-contracts").value;
      a.skills = $("agent-skills").value;
      syncAgent();
      renderAgentPicks();
    }

    function syncAgent() {
      const a = state.agents[state.agent];
      $("agent-summary").innerHTML = table([
        ["Name", a.name],
        ["Role", a.role],
        ["Model", a.model],
        ["Tools", `${splitLines(a.tools).length} entries`],
        ["Contracts", `${splitLines(a.contracts).length} entries`],
        ["Skills", `${splitLines(a.skills).length} entries`]
      ]);
      $("agent-tools-preview").textContent = a.tools;
      $("agent-contracts-preview").textContent = a.contracts;
      $("agent-skills-preview").textContent = a.skills;
    }

    function syncDb() {
      $("db-path-preview").textContent = state.db.path;
      $("db-preview").innerHTML = matrix(state.tables[state.db.table]);
    }

    function syncSecrets() {
      const rows = splitLines(state.secrets.lines).map((line) => {
        const i = line.indexOf("=");
        const key = i < 0 ? line : line.slice(0, i);
        const val = i < 0 ? "" : line.slice(i + 1);
        return [key, mask(val)];
      });
      $("secret-preview").innerHTML = matrix(rows);
    }

    function syncRoot() {
      $("root-summary").innerHTML = table([
        ["Superpassword", state.root.password],
        ["Branding Lock", state.root.branding],
        ["BIOS Freeze", state.root.freeze],
        ["Brain Access", state.bios.brain]
      ]);
    }

    function bindStaticValues() {
      $("bios-name").value = state.bios.name;
      $("bios-title").value = state.bios.title;
      $("bios-owner").value = state.bios.owner;
      $("bios-mission").value = state.bios.mission;
      $("bios-state").value = state.bios.state;
      $("bios-brain").value = state.bios.brain;
      $("bios-mode").value = state.bios.mode;
      $("bios-queue").value = state.bios.queue;
      $("org-owner").value = state.org.owner;
      $("org-reports").value = state.org.reports;
      $("org-board").value = state.org.board;
      $("org-subagents").value = state.org.subagents;
      $("db-path").value = state.db.path;
      $("db-table").innerHTML = Object.keys(state.tables).map((k) => `<option value="${k}">${k}</option>`).join("");
      $("db-table").value = state.db.table;
      $("secret-lines").value = state.secrets.lines;
      $("root-password").value = state.root.password;
      $("root-branding").value = state.root.branding;
      $("root-freeze").value = state.root.freeze;
    }

    document.addEventListener("click", (ev) => {
      const tab = ev.target.closest("[data-tab]");
      const agent = ev.target.closest("[data-agent]");
      if (tab) showTab(tab.dataset.tab);
      if (agent) { state.agent = agent.dataset.agent; loadAgentForm(); }
    });

    $("chat-send").addEventListener("click", () => {
      const text = $("chat-input").value.trim();
      if (!text) return;
      state.chat.push({ who: "owner", text });
      state.chat.push({ who: "cto-agent", text: `Interrupt queued: ${text}` });
      $("chat-input").value = "";
      syncChat();
    });

    $("chat-input").addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") { ev.preventDefault(); $("chat-send").click(); }
    });

    [["bios-name","bios","name"],["bios-title","bios","title"],["bios-owner","bios","owner"],["bios-mission","bios","mission"],["bios-state","bios","state"],["bios-brain","bios","brain"],["bios-mode","bios","mode"],["bios-queue","bios","queue"]]
      .forEach(([id,a,b]) => $(id).addEventListener("input", () => { state[a][b] = $(id).value; syncMain(); syncRoot(); }));

    [["org-owner","owner"],["org-reports","reports"],["org-board","board"],["org-subagents","subagents"]]
      .forEach(([id,key]) => $(id).addEventListener("input", () => { state.org[key] = $(id).value; syncOrganigram(); }));

    [["agent-name","name"],["agent-role","role"],["agent-model","model"],["agent-tools","tools"],["agent-contracts","contracts"],["agent-skills","skills"]]
      .forEach(([id,key]) => $(id).addEventListener("input", () => { state.agents[state.agent][key] = $(id).value; saveAgentForm(); }));

    $("db-path").addEventListener("input", () => { state.db.path = $("db-path").value; syncDb(); });
    $("db-table").addEventListener("input", () => { state.db.table = $("db-table").value; syncDb(); });
    $("secret-lines").addEventListener("input", () => { state.secrets.lines = $("secret-lines").value; syncSecrets(); });
    $("root-password").addEventListener("input", () => { state.root.password = $("root-password").value; syncRoot(); });
    $("root-branding").addEventListener("input", () => { state.root.branding = $("root-branding").value; syncRoot(); });
    $("root-freeze").addEventListener("input", () => { state.root.freeze = $("root-freeze").value; syncRoot(); });

    $("tabs").innerHTML = tabs.map((t) => `<button class="tab ${t === state.tab ? "on" : ""}" data-tab="${t}" type="button">${t[0].toUpperCase() + t.slice(1)}</button>`).join("");
    bindStaticValues();
    loadAgentForm();
    syncMain();
    syncChat();
    syncOrganigram();
    syncDb();
    syncSecrets();
    syncRoot();
  </script>
</body>
</html>
